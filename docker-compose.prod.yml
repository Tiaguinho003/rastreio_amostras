services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rastreio_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-rastreio_prod}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    volumes:
      - rastreio_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rastreio_app} -d ${POSTGRES_DB:-rastreio_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rastreio-interno-amostras:prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rastreio_app}:${POSTGRES_PASSWORD:-change-me-postgres-password}@db:5432/${POSTGRES_DB:-rastreio_prod}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_HEADER_FALLBACK_ENABLED: ${AUTH_HEADER_FALLBACK_ENABLED:-false}
      LOCAL_AUTH_ALLOW_PLAINTEXT_PASSWORDS: ${LOCAL_AUTH_ALLOW_PLAINTEXT_PASSWORDS:-false}
      LOCAL_AUTH_USERS_JSON: ${LOCAL_AUTH_USERS_JSON:?LOCAL_AUTH_USERS_JSON is required}
      UPLOADS_DIR: /var/lib/rastreio/uploads
    volumes:
      - rastreio_uploads:/var/lib/rastreio/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rastreio_pg_data:
  rastreio_uploads:
