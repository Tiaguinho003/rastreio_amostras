<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Página não encontrada — Safras &amp; Negócios</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f9f8f3;
        color: #2e3a32;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #fff;
        border: 1px solid #e3e6e1;
        border-radius: 16px;
        padding: 40px 28px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(16, 44, 28, 0.08);
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
        background: #eaf1ec;
      }
      .badge svg {
        width: 28px;
        height: 28px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 10px;
        color: #19432b;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        margin: 0;
        color: #55615a;
      }
      .brand {
        margin-top: 28px;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #8a958d;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge" aria-hidden="true">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="#2a6539"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="7" />
          <path d="M21 21l-4.3-4.3" />
        </svg>
      </div>
      <h1>Página não encontrada</h1>
      <p>
        O laudo é aberto apenas pelo QR code da etiqueta de envio. Confira o link ou escaneie o QR
        novamente.
      </p>
      <div class="brand">Safras &amp; Negócios</div>
    </main>
  </body>
</html>
