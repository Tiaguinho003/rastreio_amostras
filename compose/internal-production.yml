# Canonical Compose file for the `internal-production` environment.
# Phase 1 keeps the legacy root docker-compose.prod.yml for compatibility.

name: rastreio-internal-production

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${INTERNAL_PRODUCTION_DB_PORT:-55433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rastreio_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      POSTGRES_DB: ${POSTGRES_DB:-rastreio_internal_production}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    volumes:
      - ${POSTGRES_DATA_DIR:-rastreio_internal_production_pg_data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rastreio_app} -d ${POSTGRES_DB:-rastreio_internal_production}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: rastreio-interno-amostras:internal-production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rastreio_app}:${POSTGRES_PASSWORD:-change-me-postgres-password}@db:5432/${POSTGRES_DB:-rastreio_internal_production}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:?BOOTSTRAP_ADMIN_FULL_NAME is required}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:?BOOTSTRAP_ADMIN_USERNAME is required}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:?BOOTSTRAP_ADMIN_EMAIL is required}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-smtp}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      EMAIL_OUTBOX_DIR: ${EMAIL_OUTBOX_DIR:-/var/lib/rastreio/email-outbox}
      EMAIL_OUTBOX_FROM: ${EMAIL_OUTBOX_FROM:-rastreio@safras.local}
      UPLOADS_DIR: /var/lib/rastreio/uploads
    volumes:
      - ${UPLOADS_HOST_DIR:-rastreio_internal_production_uploads}:/var/lib/rastreio/uploads
      - ${EMAIL_OUTBOX_HOST_DIR:-rastreio_internal_production_email_outbox}:/var/lib/rastreio/email-outbox
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rastreio_internal_production_pg_data:
  rastreio_internal_production_uploads:
  rastreio_internal_production_email_outbox:
