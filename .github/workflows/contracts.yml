name: Contract Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rastreio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rastreio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rastreio_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npm run prisma:migrate:deploy

      - name: Validate schemas
        run: npm run validate:schemas

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Build Next app
        run: npm run build

      - name: Run contract tests
        run: npm run test:contracts

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests (PostgreSQL)
        run: npm run test:integration:db
